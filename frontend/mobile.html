<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalmPay - Mobile Camera Streamer</title>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("JS Error caught: " + message + "\nSource: " + source + "\nLine: " + lineno);
            return false;
        };
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mobile specific enhancements */
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            padding: 1rem;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        header h1 {
            color: #38bdf8;
            font-size: 1.8rem;
            margin-top: 0.5rem;
        }

        .mobile-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1.2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #334155;
        }

        #mobile-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(1); /* Switchable for front cam */
        }

        /* Overlay outline of a hand/palm */
        .hand-guideline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .hand-guideline svg {
            width: 70%;
            height: 70%;
            stroke: #38bdf8;
            stroke-width: 1.5;
            fill: none;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.5));
            animation: pulse-guide 2s infinite ease-in-out;
        }

        @keyframes pulse-guide {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            align-self: center;
        }

        .status-disconnected {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .status-connected {
            background-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.4);
            animation: green-pulse 2s infinite;
        }

        @keyframes green-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 10px 4px rgba(34, 197, 94, 0.2); }
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: auto;
        }

        .select-input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            font-size: 0.95rem;
            outline: none;
        }

        .mobile-btn {
            padding: 1rem;
            border-radius: 10px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-stream-start {
            background-color: #0284c7;
            color: white;
            box-shadow: 0 4px 6px rgba(2, 132, 199, 0.3);
        }

        .btn-stream-stop {
            background-color: #dc2626;
            color: white;
            box-shadow: 0 4px 6px rgba(220, 38, 38, 0.3);
        }

        .instruction-box {
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #bae6fd;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 1.5rem;">
            <h1>PalmPay Mobile Cam</h1>
            <p style="color: #94a3b8; font-size: 0.9rem; margin: 0;">Android Scanner Client</p>
        </header>

        <main style="display: flex; flex-direction: column; flex-grow: 1;">
            <div class="mobile-card">
                <div id="connection-status" class="status-badge status-disconnected">
                    <span class="status-dot" style="width: 8px; height: 8px; background: currentColor; border-radius: 50%;"></span>
                    Disconnected
                </div>

                <div class="camera-wrapper">
                    <video id="mobile-video" autoplay playsinline muted></video>
                    
                    <!-- Guide overlay of a hand outline -->
                    <div class="hand-guideline">
                        <svg viewBox="0 0 100 100">
                            <!-- Draw simple palm outline guides -->
                            <path d="M30,85 C30,75 25,60 25,50 C25,40 28,30 30,25 C31,22 34,22 35,25 C37,30 38,40 38,45 C38,40 37,20 39,12 C40,9 43,9 44,12 C46,18 46,35 46,42 C46,35 46,15 48,8 C49,5 52,5 53,8 C55,15 55,35 55,42 C55,38 56,18 58,10 C59,7 62,7 63,10 C65,18 64,38 64,48 C64,42 66,28 68,22 C69,19 72,19 73,22 C75,28 73,45 71,55 C70,60 72,65 72,70 C72,78 68,85 50,88 C38,90 30,90 30,85 Z" />
                            <!-- Scanning target line -->
                            <line x1="15" y1="50" x2="85" y2="50" stroke="#38bdf8" stroke-dasharray="2 2" stroke-width="0.5" />
                        </svg>
                    </div>
                </div>

                <div class="instruction-box">
                    Align your palm inside the guide. Keep your hand flat and ensure steady lighting.
                </div>

                <div class="control-panel">
                    <div class="form-group" style="margin-bottom: 0; flex-direction: column;">
                        <label style="font-size: 0.85rem; color: #94a3b8; font-weight: 600;">Select Camera:</label>
                        <select id="camera-select" class="select-input">
                            <option value="">Detecting cameras...</option>
                        </select>
                    </div>

                    <button id="stream-btn" class="mobile-btn btn-stream-start">Start Live Stream</button>
                </div>
            </div>
        </main>
        
        <!-- Canvas for frame capture (hidden) -->
        <canvas id="capture-canvas" style="display: none;" width="480" height="640"></canvas>
    </div>

    <script src="mobile.js?v=2"></script>
</body>
</html>
